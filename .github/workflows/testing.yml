name: Testing

'on':
  pull_request:
  push:
    branches: [ '*' ]

jobs:
  testing:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v7

    - name: Install uv
      uses: astral-sh/setup-uv@v8.2.0
      with:
        enable-cache: true

    - name: Set up Python 3.14
      run: uv python install 3.14

    - name: Install dependencies
      run: uv sync

    - name: Run py.test
      run: uv run pytest
